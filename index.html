<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>WebAR Snapchat Lens</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #video-preview-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; display: none; }
        #video-preview-container video { width: 100%; height: 100%; object-fit: contain; }
        .button-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; justify-content: center; z-index: 3; gap: 20px; }
        #playback-controls { position: absolute; bottom: 50px; left: 10px; display: flex; align-items: center; gap: 20px; z-index: 3; }
        .button-img { cursor: pointer; width: 60px; height: 60px; }
        #close-btn { position: absolute; top: 10px; right: 10px; z-index: 3; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="video-preview-container">
        <div id="playback-controls">
            <img id="share-btn" class="button-img" src="./share-button.png" alt="Share">
            <img id="download-btn" class="button-img" src="./download-button.png" alt="Download">
        </div>
        <img id="close-btn" class="button-img" src="./x-button.png" alt="Close Preview">
    </div>

    <div id="record-controls" class="button-container">
        <img id="start-btn" class="button-img" src="./start-button.png" alt="Start Recording">
        <img id="stop-btn" class="button-img" src="./stop-button.png" alt="Stop Recording" style="display: none;">
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
