<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom WebAR Experience</title>
    <style>
        /* Basic reset to make the camera fill the screen */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; font-family: sans-serif; }
        
        #canvas-container { position: relative; width: 100vw; height: 100vh; }
        
        /* The UI layer sits on top of the camera canvas */
        #ui-layer {
            position: absolute; bottom: 40px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 10;
        }

        /* Custom Snap and Record Buttons */
        button {
            padding: 15px 25px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 30px; cursor: pointer;
            background-color: #fffc00; color: #000; /* Snapchat Yellow */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        /* Style for when the recording is active */
        #record-btn.recording { background-color: #ff0000; color: #fff; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="camera-canvas"></canvas>
        
        <div id="ui-layer">
            <button id="snap-btn">📸 Snap</button>
            <button id="record-btn">🎥 Record</button>
        </div>
    </div>

    <script type="module">
        import { bootstrapCameraKit } from 'https://cdn.jsdelivr.net/npm/@snap/camera-kit@latest/dist/index.mjs';

        // ==========================================
        // 1. CONFIGURATION (Get these from Snap Developer Portal)
        // ==========================================
        const API_TOKEN = 'eyJhbGciOiJIUzI1NiIsImtpZCI6IkNhbnZhc1MyU0hNQUNQcm9kIiwidHlwIjoiSldUIn0.eyJhdWQiOiJjYW52YXMtY2FudmFzYXBpIiwiaXNzIjoiY2FudmFzLXMyc3Rva2VuIiwibmJmIjoxNzM3NzEwMDI0LCJzdWIiOiI3OTUxMmFjOS1kNDhkLTRiMWQtYmM1MS04NTU5NTcwYzM4MDZ-U1RBR0lOR344NmM2OGI4ZS1lYTVhLTRiNjUtYjRjZC1hMTYyY2EzZGVkYmUifQ.c4Nz8NrcrZYTr1hJuhy0PeeCiS7Vs7fxRrd4jkctkxw'; 
        const LENS_GROUP_ID = '7511c9a7-21ab-472f-859d-0af8985583db';
        const LENS_ID = '3e440a7f-88db-4756-a84c-285e4146d485';

        async function initWebAR() {
            try {
                // ==========================================
                // 2. SETUP CAMERA KIT & START CAMERA
                // ==========================================
                const cameraKit = await bootstrapCameraKit({ apiToken: API_TOKEN });
                const session = await cameraKit.createSession();
                
                // Camera Kit replaces the initial canvas with its own live output canvas
                const initialCanvas = document.getElementById('camera-canvas');
                initialCanvas.replaceWith(session.output.live);
                const arCanvas = session.output.live; // We will use this to take photos/videos
                
                // Ensure the new canvas fills the screen cleanly
                arCanvas.style.width = '100%';
                arCanvas.style.height = '100%';
                arCanvas.style.objectFit = 'cover';

                // Request camera permission from the user
                const mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
                await session.setSource(mediaStream);
                await session.play();

                // Load and apply your specific AR Lens
                const lens = await cameraKit.lensRepository.loadLens(LENS_ID, LENS_GROUP_ID);
                await session.applyLens(lens);

                // ==========================================
                // 3. PHOTO (SNAP) LOGIC
                // ==========================================
                document.getElementById('snap-btn').addEventListener('click', () => {
                    // Grab the current frame from the AR canvas
                    const imageUrl = arCanvas.toDataURL('image/jpeg', 1.0);
                    
                    // Create a temporary link to trigger a file download
                    const link = document.createElement('a');
                    link.download = 'my-ar-snap.jpg';
                    link.href = imageUrl;
                    link.click();
                });

                // ==========================================
                // 4. VIDEO (RECORD) LOGIC
                // ==========================================
                let recorder;
                let chunks = [];
                let isRecording = false;
                const recordBtn = document.getElementById('record-btn');

                recordBtn.addEventListener('click', () => {
                    if (!isRecording) {
                        // START RECORDING
                        const stream = arCanvas.captureStream(30); // 30 FPS
                        recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                        chunks = [];
                        
                        recorder.ondataavailable = (e) => chunks.push(e.data);
                        recorder.onstop = () => {
                            // When recording stops, compile the chunks into a video file
                            const blob = new Blob(chunks, { type: 'video/webm' });
                            const videoUrl = URL.createObjectURL(blob);
                            
                            // Trigger download
                            const link = document.createElement('a');
                            link.download = 'my-ar-video.webm';
                            link.href = videoUrl;
                            link.click();
                        };

                        recorder.start();
                        isRecording = true;
                        recordBtn.innerText = '🛑 Stop';
                        recordBtn.classList.add('recording');
                    } else {
                        // STOP RECORDING
                        recorder.stop();
                        isRecording = false;
                        recordBtn.innerText = '🎥 Record';
                        recordBtn.classList.remove('recording');
                    }
                });

            } catch (error) {
                console.error("Camera Kit Error:", error);
                alert("Could not load AR. Check console for details, ensure camera permissions are granted, and verify API tokens.");
            }
        }

        // Start the application
        initWebAR();
    </script>
</body>
</html>
